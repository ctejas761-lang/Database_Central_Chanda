<!-- define toggleUIPanel early so inline onchange handlers always find it -->
<script>
function toggleUIPanel(panelId, isChecked) {
  var panels = ['geePanel','staticPanel','poiPanel', 'otherPanel', 'officePanel', 'safariPanel', 'housePanel'];
  var checkboxMap = {
    geePanel: 'chkGEE',
    staticPanel: 'chkStatic',
    poiPanel: 'chkPOI',
    otherPanel: 'chkOther',
    officePanel: 'chkOffice',
    safariPanel: 'chkSafari',
    housePanel: 'chkHouse'
  };

  panels.forEach(function(id) {
    var el = document.getElementById(id);
    var cb = document.getElementById(checkboxMap[id]);
    if (!el) return;

    if (id === panelId && isChecked) {
      el.style.display = 'block';
      if (cb) cb.checked = true;
    } else {
      el.style.display = 'none';
      if (cb) cb.checked = false;
    }
  });
}
</script>

<script>
/* ===============================
   MAP INITIALIZATION
   =============================== */
var map = L.map('map', { zoomControl: false }).setView([19.732932, 79.399750], 10);

/* ===============================
   BASEMAPS
   =============================== */
var osmMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 19
})

var darkMap = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  { attribution: '© CARTO', maxZoom: 19 }
);

var satelliteMap = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { attribution: '© Esri', maxZoom: 19 }
);

var googleStreets = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{
    maxZoom: 20,
    subdomains:['mt0','mt1','mt2','mt3']
});

var googleHybrid = L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}',{
    maxZoom: 20,
    subdomains:['mt0','mt1','mt2','mt3']
}).addTo(map);

/* ===============================
   LAYER GROUPS
   =============================== */
var divisionLayer = L.featureGroup();
var rangeLayer = L.featureGroup();
var roundLayer = L.featureGroup();
var beatLayer = L.featureGroup();
var compartmentLayer = L.featureGroup();
var waterbodyLayer = L.featureGroup();
var villageLayer = L.featureGroup();
var firewatchtowerLayer = L.featureGroup();
var fdcmLayer = L.featureGroup();
var kanhargaonWlsLayer = L.featureGroup();
var rangeofficeLayer = L.featureGroup();
var roundofficeLayer = L.featureGroup();
var restHouseLayer = L.featureGroup();
var jogapursafariLayer = L.featureGroup();
var karwasafariLayer = L.featureGroup();


/* ===============================
   PROJECTION (UTM 44N)
   =============================== */
proj4.defs("EPSG:32644", "+proj=utm +zone=44 +datum=WGS84 +units=m +no_defs");

/* ===============================
   DATA LOADING FUNCTION
   =============================== */
function loadBoundaryLayer(url, layerGroup, color, nameProp, labelTitle, isUTM = true, showAllAttributes = false, labelPredicate = null) {
  fetch(encodeURI(url))
    .then(response => {
      if (!response.ok) throw new Error("HTTP " + response.status);
      return response.json();
    })
    .then(data => {
      // Transform coordinates
      if (isUTM) {
      data.features.forEach(feature => {
        if (feature.geometry.type === "MultiPolygon") {
          feature.geometry.coordinates.forEach(polygon => {
            polygon.forEach(ring => {
              ring.forEach(coord => {
                const t = proj4("EPSG:32644", "WGS84", coord);
                coord[0] = t[0];
                coord[1] = t[1];
              });
            });
          });
        } else if (feature.geometry.type === "Polygon") {
          feature.geometry.coordinates.forEach(ring => {
            ring.forEach(coord => {
              const t = proj4("EPSG:32644", "WGS84", coord);
              coord[0] = t[0];
              coord[1] = t[1];
            });
          });
        }
      });
      }

      // Create GeoJSON layer
      var geoJson = L.geoJSON(data, {
        style: function () {
          return { color: color, weight: 2, fillOpacity: 0.0, fillColor: color };
        },
        onEachFeature: function (feature, layer) {
          function buildAttributesTable(props) {
            if (!props) return '<div>No attributes</div>';
            var content = '<div style="max-height: 300px; overflow-y: auto;">'
              + '<table class="attr-table" border="1" style="border-collapse: collapse; width: 100%; font-size: 12px;">';
            for (var key in props) {
              content += '<tr><td style="padding: 4px; background-color: #f2f2f2; width: 35%;"><b>' + key + '</b></td><td style="padding: 4px;">' + props[key] + '</td></tr>';
            }
            content += '</table></div>';
            return content;
          }

          function buildStyledAttributes(props) {
            var table = buildAttributesTable(props);
            var boxKey = (props && (props.fides || props.box_type || props.type)) || '';
            var fidesColors = {
              'typeA': '#e6f9e6',
              'typeB': '#fde6e6',
              'typeC': '#e6f0ff'
            };
            var color = fidesColors[boxKey] || '#ffffff';
            return '<div class="attr-box" style="background:' + color + ';">' + table + '</div>';
          }

          if (showAllAttributes && feature.properties) {
            layer.bindPopup(buildStyledAttributes(feature.properties));
          } else {
            var displayName = feature.properties && feature.properties[nameProp] ? feature.properties[nameProp] : '';
            layer.bindPopup("<b>" + labelTitle + ":</b> " + displayName);
          }

          // On click always show full attributes table (styled by fides/box type)
          layer.on('click', function(e) {
            var content = buildStyledAttributes(feature.properties);
            if (e && e.latlng) {
              layer.bindPopup(content).openPopup(e.latlng);
            } else {
              layer.bindPopup(content).openPopup();
            }
          });
        }
      });

      layerGroup.addLayer(geoJson);

      // Add labels (defensive: handle different geometry / layer types)
      geoJson.eachLayer(function (layer) {
        try {
          var center = null;

          if (typeof layer.getBounds === 'function') {
            var b = layer.getBounds();
            if (b && typeof b.getCenter === 'function') center = b.getCenter();
          }

          if (!center && typeof layer.getLatLng === 'function') {
            center = layer.getLatLng();
          }

          // Fallback: try to compute a simple centroid from feature geometry
          if (!center && layer.feature && layer.feature.geometry) {
            var geom = layer.feature.geometry;
            if (geom.type === 'Polygon') {
              var coords = geom.coordinates[0] || [];
              if (coords.length) {
                var sx = 0, sy = 0;
                coords.forEach(function(c){ sx += c[0]; sy += c[1]; });
                center = L.latLng(sy/coords.length, sx/coords.length);
              }
            } else if (geom.type === 'MultiPolygon') {
              var coords = (geom.coordinates[0] && geom.coordinates[0][0]) || [];
              if (coords.length) {
                var sx = 0, sy = 0;
                coords.forEach(function(c){ sx += c[0]; sy += c[1]; });
                center = L.latLng(sy/coords.length, sx/coords.length);
              }
            } else if (geom.type === 'Point') {
              var p = geom.coordinates; // [x,y]
              center = L.latLng(p[1], p[0]);
            }
          }

          if (!center) return; // couldn't determine a center, skip label

          var name = (layer.feature && layer.feature.properties) ? layer.feature.properties[nameProp] : null;
          if (!name) return;

          // If a predicate is provided, allow it to decide whether to show the label
          if (typeof labelPredicate === 'function') {
            try {
              var keep = labelPredicate(layer.feature && layer.feature.properties ? layer.feature.properties : {});
              if (!keep) return;
            } catch (e) {
              return;
            }
          }

          L.marker(center, {
            icon: L.divIcon({
              className: 'range-label',
              html: name,
              iconSize: [60, 10],
              iconAnchor: [30, 5]
            })
          }).addTo(layerGroup);
        } catch (e) {
          console.warn('Skipping label for a feature due to error:', e);
        }
      });

      // Fit bounds for Round Boundary (default view)
      if (labelTitle === "Round Boundary") {
        map.fitBounds(geoJson.getBounds().pad(0.1));
      }
    })
    .catch(err => {
      console.error("Error loading " + labelTitle, err);
      alert(`Failed to load the ${labelTitle} layer.\n\nPlease check that the data file is in the correct folder.\n\nError: ${err.message}`);
    });
}

// Load all layers 
loadBoundaryLayer("Division_outer.geojson", divisionLayer, "cyan", "Division_N", "Division Boundary");
loadBoundaryLayer("Range_Json.geojson", rangeLayer, "blue", "Range_Name", "Range Boundary");
loadBoundaryLayer("Round_File.geojson", roundLayer, "purple", "Round_Name", "Round Boundary");
loadBoundaryLayer("Beat_Boundary.geojson", beatLayer, "black", "Beat_Name", "Beat Boundary");
loadBoundaryLayer("Comparment_Modify1.geojson", compartmentLayer, "red", "Old_ComptN", "Compartment Boundary");
loadBoundaryLayer("Village_file_1.geojson", villageLayer, "Orange", "Name", "Village Boundary");
loadBoundaryLayer("firewatchtower.geojson", firewatchtowerLayer, "Black", "Name", "Fire Watch Tower");
loadBoundaryLayer("Jogapur_Safari_Route.geojson", jogapursafariLayer, "Red", "Name", "Jogapur Safari", false);
loadBoundaryLayer("karwa_Safari_Route_Demo.geojson", karwasafariLayer, "Red", "Name", "karwa Safari", false);
loadBoundaryLayer("FDCM.geojson", fdcmLayer, "brown", "FDCM", "FDCM Boundary", true);
loadBoundaryLayer("Kanhargaon WLS.geojson", kanhargaonWlsLayer, "green ", "Name", "Kanhargaon WLS", false);


// Load Range Office Headquarters as point data with a marker icon
function loadPointLayer(url, layerGroup, iconHtml, nameProp, labelTitle, isUTM = true) {
  return fetch(encodeURI(url))
    .then(response => { if (!response.ok) throw new Error("HTTP " + response.status); return response.json(); })
    .then(data => {
      data.features.forEach(feature => {
        if (!feature.geometry) return;
        // transform UTM coords if needed
        var coords = feature.geometry.coordinates;
        if (isUTM && coords && (feature.geometry.type === 'Point')) {
          const t = proj4("EPSG:32644", "WGS84", coords);
          coords = [t[0], t[1]];
        }

        if (feature.geometry.type === 'Point') {
          var latlng = [coords[1], coords[0]];
          var marker = L.marker(latlng, {
            icon: L.divIcon({ className: 'range-office-icon', html: iconHtml, iconSize: [24,24], iconAnchor: [12,12] })
          });
          var popupContent = feature.properties && feature.properties[nameProp] ? ("<b>"+labelTitle+":</b> " + feature.properties[nameProp]) : "";
          if (popupContent) marker.bindPopup(popupContent);
          layerGroup.addLayer(marker);
        } else if (feature.geometry.type === 'MultiPoint') {
          feature.geometry.coordinates.forEach(c => {
            var use = c;
            if (isUTM) {
              const t = proj4("EPSG:32644", "WGS84", c);
              use = [t[0], t[1]];
            }
            var marker = L.marker([use[1], use[0]], { icon: L.divIcon({ className: 'range-office-icon', html: iconHtml, iconSize: [24,24], iconAnchor: [12,12] }) });
            layerGroup.addLayer(marker);
          });
        }
      });
    })
    .catch(err => {
      console.error("Error loading " + labelTitle, err);
      alert(`Failed to load the ${labelTitle} layer.\n\nPlease check that the data file is in the correct folder.\n\nError: ${err.message}`);
      throw err;
    });
}

// use the correct file name and add a building icon; set isUTM=false if the geojson is already WGS84
// GeoJSON uses EPSG:32644 (UTM); set isUTM=true so coordinates are transformed to WGS84

/* ===============================
   ZOOM TO VISIBLE LAYERS
   =============================== */
function zoomToVisibleLayers() {
  const visibleBounds = L.latLngBounds([]);
  const layerGroups = [divisionLayer, rangeLayer, roundLayer, beatLayer, compartmentLayer, waterbodyLayer,  villageLayer, restHouseLayer ,jogapursafariLayer, karwasafariLayer, fdcmLayer, kanhargaonWlsLayer];
  layerGroups.forEach(lg => {
    // Check if the layer group is on the map and has content
    if (map.hasLayer(lg) && lg.getLayers().length > 0) {
      visibleBounds.extend(lg.getBounds());
    }
  });

  if (visibleBounds.isValid()) {
    map.fitBounds(visibleBounds.pad(0.1));
  }
}

/* ===============================
   TOGGLE LAYER FUNCTION
   =============================== */
function toggleLayer(layer, isChecked) {
  if (isChecked) {
    map.addLayer(layer);
    if (layer.getLayers().length > 0) {
      zoomToVisibleLayers();
    } else {
      layer.once('layeradd', function() {
        zoomToVisibleLayers();
      });
    }
  } else {
    map.removeLayer(layer);
    zoomToVisibleLayers();
  }
  updateLegend();
}

  { layer: divisionLayer, color: "cyan", label: "Division Boundary" },

  { layer: kanhargaonWlsLayer, color: "green", label: "Kanhargaon WLS" }
];

var legend = L.control({ position: "bottomright" });
legend.onAdd = function (map) {
  var div = L.DomUtil.create("div", "legend");
  div.id = 'layerLegend';
  updateLegend();
  return div;
};

function toggleLegend(isVisible) {
  var container = legend.getContainer();
  if (!container) return;
  container.style.display = isVisible ? 'block' : 'none';
}

function applyInitialLayerVisibility() {
  var layerMap = {
    chkDivision: divisionLayer,
    chkRange: rangeLayer,
    chkRound: roundLayer,
    chkBeat: beatLayer,
    chkCompartment: compartmentLayer,
    chkVillage: villageLayer,
    chkFirewatchtower: firewatchtowerLayer
  };

  Object.keys(layerMap).forEach(function(checkboxId) {
    var checkbox = document.getElementById(checkboxId);
    if (checkbox && checkbox.checked) {
      map.addLayer(layerMap[checkboxId]);
    }
  });

  updateLegend();
}

function updateLegend() {
  var legendDiv = document.getElementById('layerLegend');
  if (!legendDiv) return;

  var html = '';
  legendItems.forEach(function(item) {
    if (!map.hasLayer(item.layer)) return;
    var symbol = '';
    if (item.iconHtml) {
      symbol = '<span style="display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; margin-right:10px;">' + item.iconHtml + '</span>';
    } else {
      var color = item.color || 'transparent';
      symbol = '<span style="background: ' + color + '; width: 18px; height: 18px; margin-right: 10px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.2); display: inline-block;"></span>';
    }
    html += '<div style="display: flex; align-items: center; margin-bottom: 5px;">' + symbol + '<span>' + item.label + '</span></div>';
  });

  if (!html) {
    html = '<div style="font-size: 13px; color: #333;">No visible legend items</div>';
  }

  legendDiv.innerHTML = html;
}

legend.addTo(map);
applyInitialLayerVisibility();

// Helper to clear all layers managed by the dropdowns to ensure only one is active
function clearAllDropdownLayers() {
    const layers = [
        waterbodyLayer,
        restHouseLayer,
        jogapursafariLayer,
        karwasafariLayer,
        fdcmLayer,
        kanhargaonWlsLayer,
        rangeofficeLayer,
        roundofficeLayer
    ];
    layers.forEach(layer => {
        if (map.hasLayer(layer)) {
            map.removeLayer(layer);
        }
    });
    updateLegend();
}

/* ================= WATER LAYERS DROPDOWN HANDLER ================= */
function loadPoiLayer() {
  var select = document.getElementById('poiSelect');
  var val = select.value;
  var layerMap = { "waterbody": waterbodyLayer };

  clearAllDropdownLayers();

  if (val && layerMap[val]) {
    // The waterbody layer is pre-loaded from 'Waterbody_cc.geojson', so we just add it.
    map.addLayer(layerMap[val]);
    zoomToVisibleLayers();
    updateLegend();
  } else {
    updateLegend();
  }
}
